# font_family      JetBrains Mono
# bold_font        auto
# italic_font      auto
# bold_italic_font auto
#
# Startet tmux automatisch
shell tmux

font_size        10.5
background_opacity 0.8
confirm_os_window_close 0
# Angepasste Farben - matter und weniger kontrastreich
foreground #c0c0c0
background #1a1a1a

# Optional: Cursor-Farbe auch matter machen
cursor #808080

# Systemfarben matter machen (weniger gesättigt)
# Schwarz
color0 #2e2e2e
color8 #555555

# Rot
color1 #cc6666
color9 #d98888

# Grün
color2  #99cc99
color10 #b3d9b3

# Gelb
color3  #cccc99
color11 #d9d9b3

# Blau
color4  #8899cc
color12 #a3b3d9

# Magenta
color5  #cc99cc
color13 #d9b3d9

# Cyan
color6  #99cccc
color14 #b3d9d9

# Weiß
color7  #cccccc
color15 #e6e6e6

# BEGIN_KITTY_FONTS
font_family      family='Adwaita Mono' postscript_name=Adwaita-Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
