# #######################################################################################
# HYPRLAND CONFIG - FIXED VERSION
# #######################################################################################

$mainMod = ALT
$wsManager = ~/.config/hypr/workspace-manager.sh

################
### MONITORS ###
################

monitor=HDMI-A-1,2560x1440@60,0x0,1
monitor=DP-1,1920x1080@60,2560x0,1
monitor=HDMI-A-2,1920x1080@60,4480x0,1

# Workspace-Monitor-Zuweisung (10 Workspaces pro Monitor)
# HDMI-A-1: Workspaces 1-10
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1

# DP-1: Workspaces 11-20
workspace = 11, monitor:DP-1, default:true
workspace = 12, monitor:DP-1
workspace = 13, monitor:DP-1
workspace = 14, monitor:DP-1
workspace = 15, monitor:DP-1
workspace = 16, monitor:DP-1
workspace = 17, monitor:DP-1
workspace = 18, monitor:DP-1
workspace = 19, monitor:DP-1
workspace = 20, monitor:DP-1

# HDMI-A-2: Workspaces 21-30
workspace = 21, monitor:HDMI-A-2, default:true
workspace = 22, monitor:HDMI-A-2
workspace = 23, monitor:HDMI-A-2
workspace = 24, monitor:HDMI-A-2
workspace = 25, monitor:HDMI-A-2
workspace = 26, monitor:HDMI-A-2
workspace = 27, monitor:HDMI-A-2
workspace = 28, monitor:HDMI-A-2
workspace = 29, monitor:HDMI-A-2
workspace = 30, monitor:HDMI-A-2

#################
### AUTOSTART ###
#################

exec-once = hyprpaper
exec-once = hyprpm reload
exec-once = wl-paste --type text --watch cliphist store
exec-once = hyprsunset -t 3500 &
exec-once = firefox https://calendar.google.com/calendar/u/1/r
exec-once = swayosd-server
exec-once = waybar

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = WEBKIT_DISABLE_DMABUF_RENDERER,1

# NVIDIA Firefox Freeze Fix (Explicit Sync Bug)
env = MOZ_ENABLE_WAYLAND,1
env = __NV_DISABLE_EXPLICIT_SYNC,1
env = NVD_BACKEND,direct

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(d4af37b3)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

cursor {
    no_warps = true
}

decoration {
    rounding = 5
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 0
    animation = windowsOut, 0
    animation = border, 0
    animation = fade, 0
    animation = workspaces, 0
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

# FIX: Geänderte Position und Syntax für Gestures (Hyprland 0.51+ syntax)
gestures {
    gesture = 3, horizontal, workspace
}

###################
### KEYBINDINGS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun --allow-images --image-size 32

bind = $mainMod, t, exec, ~/.config/hypr/scripts/toggle-mouse.sh
bind = $mainMod, a, exec, swayosd-client --output-volume +0

# Workspace Navigation
bind = $mainMod, 1, exec, $wsManager workspace 1
bind = $mainMod, 2, exec, $wsManager workspace 2
bind = $mainMod, 3, exec, $wsManager workspace 3
bind = $mainMod, 4, exec, $wsManager workspace 4
bind = $mainMod, 5, exec, $wsManager workspace 5
bind = $mainMod, 6, exec, $wsManager workspace 6
bind = $mainMod, 7, exec, $wsManager workspace 7
bind = $mainMod, 8, exec, $wsManager workspace 8
bind = $mainMod, 9, exec, $wsManager workspace 9
bind = $mainMod, 0, exec, $wsManager workspace 10

bind = $mainMod SHIFT, 1, exec, $wsManager movetoworkspacesilent 1
bind = $mainMod SHIFT, 2, exec, $wsManager movetoworkspacesilent 2
bind = $mainMod SHIFT, 3, exec, $wsManager movetoworkspacesilent 3
bind = $mainMod SHIFT, 4, exec, $wsManager movetoworkspacesilent 4
bind = $mainMod SHIFT, 5, exec, $wsManager movetoworkspacesilent 5
bind = $mainMod SHIFT, 6, exec, $wsManager movetoworkspacesilent 6
bind = $mainMod SHIFT, 7, exec, $wsManager movetoworkspacesilent 7
bind = $mainMod SHIFT, 8, exec, $wsManager movetoworkspacesilent 8
bind = $mainMod SHIFT, 9, exec, $wsManager movetoworkspacesilent 9
bind = $mainMod SHIFT, 0, exec, $wsManager movetoworkspacesilent 10

# Standard Binds
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, D, exec, ~/.config/hypr/scripts/smart-wofi.sh
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

bind = $mainMod, comma, exec, mkdir -p ~/Pictures/Screenshots && hyprshot -m region -o ~/Pictures/Screenshots
bind = $mainMod, period, exec, ~/.config/hypr/scripts/screenshot-frozen.sh
bind = $mainMod, U, exec, python3 ~/.config/hypr/scripts/translator.py

# Focus & Scrolling
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, mouse_down, workspace, m+1
bind = $mainMod, mouse_up, workspace, m-1

# Mouse Binds
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = $mainMod, KP_Add, exec, swayosd-client --output-volume raise
bindel = $mainMod, KP_Subtract, exec, swayosd-client --output-volume lower

##############################
### WINDOWS AND WORKSPACES ###
##############################

# FIX: Neue windowrule Syntax für Hyprland v0.53+
windowrule = suppress_event maximize, match:class .*
windowrule = float 1, match:class ^clock-float$
windowrule = center 0, match:class ^clock-float$
windowrule = size 400 240, match:class ^clock-float$
windowrule = float 1, match:class ^translator-float$
windowrule = center 1, match:class ^translator-float$
windowrule = size 360 110, match:class ^translator-float$
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0
windowrule = float 1, match:title ^webcam-float$
windowrule = size 400 225, match:title ^webcam-float$
windowrule = pin 1, match:title ^webcam-float$
windowrule = move 100%-420 100%-245, match:title ^webcam-float$
