# ==============================================================
# ===== KRITISCHE STABILITÄTS‑EINSTELLUNGEN ====================
# ==============================================================
# Escape-Time sollte NIEMALS 0 sein - das führt zu Instabilität
# Empfohlener Wert: 1‑10 ms
set -sg escape-time 1

# tmux-resurrect Plugin (falls du Plugin‑Manager nutzt)
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Status‑Interval sollte NICHT 0 sein - das kann Crashes verursachen
# 0 deaktiviert Updates komplett und kann zu Problemen führen
set -g status-interval 5

# Terminal‑Type für bessere Kompatibilität
# tmux-256color ist moderner als screen-256color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ==============================================================
# ===== SHELL‑EINSTELLUNG =======================================
# ==============================================================
# Prüfe ob Fish existiert, bevor es gesetzt wird
set-option -g default-shell /usr/bin/fish

# ==============================================================
# ===== BASIS‑EINSTELLUNGEN =====================================
# ==============================================================
# Maus‑Support (robust und sicher)
set -g mouse on

# Größerer Scrollback‑Buffer für Stabilität
# 10000 ist gut, kann aber bei Bedarf erhöht werden
set -g history-limit 50000

# Fenster‑Nummerierung (beginnt bei 1)
set -g base-index 1
set -g pane-base-index 1

# Fenster automatisch neu nummerieren
set -g renumber-windows on

# Fokus‑Events aktivieren (wichtig für vim‑Integration)
set -g focus-events on

# Aggressives Resize nur wenn nötig
setw -g aggressive-resize on

# ==============================================================
# ===== COPY‑MODE VERBESSERUNGEN ================================
# ==============================================================

# Vi‑Modus für bessere Kopier‑Funktionalität
setw -g mode-keys vi

# Verbesserte Copy‑Mode Bindings mit Fehler‑Handling
bind-key -T copy-mode-vi v  send-keys -X begin-selection
bind-key -T copy-mode-vi y  send-keys -X copy-pipe-and-cancel \
    "xclip -selection clipboard -i 2>/dev/null || \
     xsel -b 2>/dev/null || \
     pbcopy 2>/dev/null"

bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel \
    "xclip -selection clipboard -i 2>/dev/null || \
     xsel -b 2>/dev/null || \
     pbcopy 2>/dev/null"

# Fallback für normales Copy‑Mode
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel \
    "xclip -selection clipboard -i 2>/dev/null || \
     xsel -b 2>/dev/null || \
     pbcopy 2>/dev/null"
# Standard-Splits auch mit aktuellem Pfad
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# ==============================================================
# ===== KEYBINDINGS ============================================
# ==============================================================

# Alt+1 für vertikalen Split (nebeneinander)
bind-key -n M-1 split-window -h -c "#{pane_current_path}"

# Alt+2 für horizontalen Split (übereinander)
bind-key -n M-2 split-window -v -c "#{pane_current_path}"

# Intuitive Split‑Keys mit aktuellem Pfad (falls du sie nutzt)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Alt+Pfeiltasten zum Wechseln zwischen Panes
bind-key -n M-Left  select-pane -L
bind-key -n M-Right select-pane -R
bind-key -n M-Up    select-pane -U
bind-key -n M-Down  select-pane -D

# Pane‑Größe anpassen mit Alt+Shift+Pfeiltasten
bind-key -n M-S-Left  resize-pane -L 5
bind-key -n M-S-Right resize-pane -R 5
bind-key -n M-S-Up    resize-pane -U 5
bind-key -n M-S-Down  resize-pane -D 5

# Pane ohne Bestätigung schließen
bind x kill-pane

# Config neu laden mit sauberer Bestätigung
bind r source-file ~/.tmux.conf \; display-message "✓ Config neu geladen!"

# ──────────────────────────────────────────────────────────────
# Fenster‑Auswahl – jetzt Alt+F1 … Alt+F10
# (M‑ = Alt/Meta, -n = kein Prefix)
# ──────────────────────────────────────────────────────────────
bind-key -n M-F1  select-window -t 1
bind-key -n M-F2  select-window -t 2
bind-key -n M-F3  select-window -t 3
bind-key -n M-F4  select-window -t 4
bind-key -n M-F5  select-window -t 5
bind-key -n M-F6  select-window -t 6
bind-key -n M-F7  select-window -t 7
bind-key -n M-F8  select-window -t 8
bind-key -n M-F9  select-window -t 9
bind-key -n M-F10 select-window -t 10

# ==============================================================
# ===== STATUS BAR (EINFACH UND STABIL) =======================
# ==============================================================

# Einfache, zuverlässige Status‑Bar ohne externe Skripte
set -g status off
set -g status-position bottom
set -g status-justify left
set -g status-style bg=black,fg=white

# Linke Seite: Session‑Name
set -g status-left "#[fg=green,bold][#S] "
set -g status-left-length 40

# Rechte Seite: Datum und Zeit
set -g status-right "#[fg=yellow]%a #[fg=yellow]%d.%m.%Y #[fg=cyan]%H:%M "
set -g status-right-length 50

# Fenster‑Status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=blue,fg=white,bold] #I:#W "

# ==============================================================
# ===== PERFORMANCE & STABILITÄT ================================
# ==============================================================

# Display‑Time für Messages
set -g display-time 2000

# Verhindere automatisches Umbenennen von Fenstern
set -g allow-rename off
set -g automatic-rename off

# Buffer‑Limit für Copy‑Mode
set -g buffer-limit 20

# ==============================================================
# ===== FARB‑SUPPORT ===========================================
# ==============================================================

# RGB‑Farben aktivieren
set -as terminal-features ",*:RGB"

# ==============================================================
# ===== SESSION‑VERWALTUNG =====================================
# ==============================================================

# Sessions nicht automatisch beenden
set -g detach-on-destroy off

# Display‑Panes Zeit erhöhen
set -g display-panes-time 2000

# ==============================================================
# ===== DEBUGGING (Optional aktivieren bei Problemen) ========
# ==============================================================

# Zum Debuggen: Entferne das # vor der nächsten Zeile
# set -g status-right "#{?client_prefix,#[fg=red]PREFIX,} #[fg=yellow]%H:%M "

# --------------------------------------------------------------
# Ende der tmux‑Konfiguration
# --------------------------------------------------------------
